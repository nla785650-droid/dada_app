name: dada
description: "搭哒 - 二次元委托、摄影陪拍和社交陪玩交易平台"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.2.0

  # 后端
  supabase_flutter: ^2.5.6

  # 首页瀑布流
  flutter_staggered_grid_view: ^0.7.0

  # 日历预约
  table_calendar: ^3.1.2

  # 图片缓存
  cached_network_image: ^3.3.1

  # 相机 & 媒体
  camera: ^0.11.1
  video_player: ^2.9.2
  image: ^4.2.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

  # 图片选择
  image_picker: ^1.1.2
  dotted_border: ^2.1.0

  # 工具
  intl: ^0.19.0
  uuid: ^4.4.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # 交易闭环
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  confetti: ^0.7.0

  # 动态背景主色提取
  palette_generator: ^0.3.3

  # 评分 & AI
  flutter_rating_bar: ^4.0.1
  google_generative_ai: ^0.4.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
