name: Build & Deploy Web

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 部署到 gh-pages 需要写入权限
    steps:
      - uses: actions/checkout@v4

      - name: Find project root
        id: find
        run: |
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" -type f 2>/dev/null | head -1)
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "::error::未找到 pubspec.yaml 文件"
            exit 1
          fi
          WORKING_DIR=$(dirname "$PUBSPEC_PATH")
          if [ "$WORKING_DIR" = "." ]; then
            WEB_FOLDER="build/web"
          else
            WEB_FOLDER="${WORKING_DIR}/build/web"
          fi
          echo "working_dir=$WORKING_DIR" >> $GITHUB_OUTPUT
          echo "web_folder=$WEB_FOLDER" >> $GITHUB_OUTPUT
          echo "✅ WORKING_DIR=$WORKING_DIR | WEB=$WEB_FOLDER"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'  # Dart 3.9+
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: ${{ steps.find.outputs.working_dir }}
        run: flutter pub get

      - name: Build Web
        working-directory: ${{ steps.find.outputs.working_dir }}
        run: flutter build web --release --base-href "/dada_app/"

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ${{ steps.find.outputs.web_folder }}
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true
          single-commit: true
